services:
  db:
    image: postgres:16-alpine
    container_name: wavesight-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wavesight}
      POSTGRES_USER: ${POSTGRES_USER:-wavesight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wavesight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wavesight} -d ${POSTGRES_DB:-wavesight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: wavesight-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://wavesight:wavesight@db:5432/wavesight}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: wavesight-frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
